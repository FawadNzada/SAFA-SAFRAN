<div class="container">

  <div class="grid">
    <div
      class="card"
      *ngFor="let p of filteredMdemos"
      (click)="showDemo(p)"
    >
      <button
        class="favorite-btn"
        type="button"
        (click)="addToFavorites(p, $event)"
      >
        {{ isFavorite(p.id) ? '❤️' : '🤍' }}
      </button>

      <div class="imgWrap">
        <img [src]="p.image || 'assets/LOGO.png'" [alt]="p.name">
      </div>

      <div class="info">
        <div class="title">{{ p.name }}</div>

        <div class="meta">
          <span *ngIf="p.weight">{{ p.weight }}</span>
        </div>

        <div class="price" *ngIf="p.price !== undefined">
          € {{ p.price }}
        </div>
      </div>
    </div>
  </div>

  <p *ngIf="filteredMdemos.length === 0" class="empty">
    Keine Produkte gefunden.
  </p>

</div>
