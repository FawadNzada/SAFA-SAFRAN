<header class="header">

  <a class="logo-link" routerLink="/home">
    <div class="logo">
      <img src="assets/LOGO.png" alt="SAFA Logo" />
    </div>
  </a>

  <nav class="nav">

    <!-- Produkte -->
    <a routerLink="/products">Produkte</a>

    <div class="search-wrapper">
      <div class="search">
        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Produkt suchen..."
          (input)="onSearchInput()"
          (keyup.enter)="search()"
          (focus)="onFocus()"
          (blur)="onBlur()"
        />
        <button (click)="search()">Suchen</button>
      </div>

      <div class="suggestions" *ngIf="showSuggestions">
        <div
          class="suggestion-item"
          *ngFor="let p of suggestions"
          (mousedown)="openSuggestion(p)"
        >
          {{ p.name || ('Produkt #' + p.id) }}
        </div>
      </div>
    </div>

    <a routerLink="/cart" class="cart-link" [class.bump]="bump">
      Warenkorb <span class="badge">({{ cart.count() }})</span>
    </a>

    <!-- ✅ Willkommen + Animation -->
    <span class="welcome" *ngIf="authenticated">
        Willkommen {{ username }}
  </span>

    <a class="account-link" routerLink="/account" *ngIf="authenticated">
      Konto
    </a>

    <button *ngIf="!authenticated" (click)="goLogin()">Login</button>
    <button *ngIf="authenticated" (click)="logout()">Logout</button>

  </nav>
</header>
