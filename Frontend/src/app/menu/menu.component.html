<header class="header">

  <a class="logo logo-link" routerLink="/home" aria-label="Zur Startseite">
    <img src="assets/LOGO.png" alt="SAFA Logo" />
  </a>

  <nav class="nav">

    <a routerLink="/mdemos">Produkte</a>

    <div class="search-wrapper">
      <div class="search">
        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Produkt suchen..."
          (input)="onSearchInput()"
          (keyup.enter)="search()"
          (focus)="onFocus()"
          (blur)="onBlur()"
        />
        <button (click)="search()">Suchen</button>
      </div>

      <div class="suggestions" *ngIf="showSuggestions">
        <div
          class="suggestion-item"
          *ngFor="let p of suggestions"
          (mousedown)="openSuggestion(p)"
        >
          {{ p.name || ('Produkt #' + p.id) }}
        </div>
      </div>
    </div>

    <a routerLink="/cart" class="cart-link" [class.bump]="bump">
      Warenkorb <span class="badge">({{ cart.count() }})</span>
    </a>

    <!-- Willkommen -->
    <span
      class="welcome"
      *ngIf="authenticated"
      [class.welcome-anim]="welcomeAnim"
    >
      Willkommen {{ username }}
    </span>

    <a class="account-link" *ngIf="authenticated" routerLink="/account">Konto</a>

    <!-- Login / Logout -->
    <button
      class="login-btn"
      *ngIf="!authenticated"
      (click)="goLogin()"
    >
      Login
    </button>

    <button
      class="logout-btn"
      *ngIf="authenticated"
      (click)="logout()"
    >
      Logout
    </button>

  </nav>
</header>
