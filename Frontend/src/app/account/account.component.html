<div class="account-page">
  <h1>Mein Konto</h1>

  <div class="grid">
    <a
      class="tile"
      *ngFor="let t of tiles"
      [routerLink]="t.link"
    >
      <div class="icon">
        {{ t.icon }}
      </div>

      <div class="text">
        <div class="title">
          {{ t.title }}
        </div>
        <div class="desc">
          {{ t.desc }}
        </div>
      </div>
    </a>
  </div>
</div>
